<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop</title>
    <!-- Tải Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tải font Inter từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="app" class="min-h-screen flex flex-col">

        <!-- Header -->
        <header class="bg-white shadow-md">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">🐾 Pet Shop</h1>
                <nav>
                    <a href="#" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Trang Chủ</a>
                    <a href="#" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Sản Phẩm</a>
                    <a href="#" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Đăng Nhập</a>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="container mx-auto px-4 py-8 flex-grow">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Sản phẩm nổi bật</h2>

            <!-- Khu vực hiển thị sản phẩm -->
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Dữ liệu sản phẩm sẽ được chèn vào đây bằng JavaScript -->
                <p id="loading-message" class="col-span-full text-center text-gray-500">Đang tải sản phẩm...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-gray-800 text-white mt-auto">
            <div class="container mx-auto px-4 py-6 text-center">
                <p>&copy; 2025 Pet Shop. All rights reserved.</p>
            </div>
        </footer>

    </div>

    <script>
        // Chờ cho trang web tải xong hoàn toàn
        document.addEventListener('DOMContentLoaded', function() {
            const productListElement = document.getElementById('product-list');
            const loadingMessage = document.getElementById('loading-message');

            // Hàm để gọi API và hiển thị sản phẩm
            async function fetchAndDisplayProducts() {
                try {
                    // Gọi đến API /api/Product mà bạn đã tạo
                    // Dùng URL tương đối vì front-end và back-end chạy trên cùng một domain
                    const response = await fetch('/api/Product');

                    if (!response.ok) {
                        throw new Error(`Lỗi HTTP! Status: ${response.status}`);
                    }

                    const products = await response.json();

                    // Xóa thông báo "Đang tải..."
                    loadingMessage.style.display = 'none';

                    // Nếu không có sản phẩm nào
                    if (products.length === 0) {
                        productListElement.innerHTML = '<p class="col-span-full text-center text-gray-500">Chưa có sản phẩm nào.</p>';
                        return;
                    }

                    // Tạo HTML cho mỗi sản phẩm và chèn vào trang web
                    products.forEach(product => {
                        const productCard = `
                            <div class="bg-white rounded-lg shadow-md overflow-hidden transform hover:-translate-y-1 transition-transform duration-300">
                                <img src="https://placehold.co/400x300/E2E8F0/333333?text=${product.name}" alt="${product.name}" class="w-full h-48 object-cover">
                                <div class="p-4">
                                    <h3 class="text-lg font-semibold text-gray-800">${product.name}</h3>
                                    <p class="text-gray-600 mt-1">${product.brandName || 'Chưa có thương hiệu'}</p>
                                    <div class="flex justify-between items-center mt-4">
                                        <span class="text-xl font-bold text-blue-600">${product.price.toLocaleString('vi-VN')} ₫</span>
                                        <button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-full transition-colors duration-300">
                                            Thêm vào giỏ
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        productListElement.innerHTML += productCard;
                    });

                } catch (error) {
                    console.error('Không thể tải sản phẩm:', error);
                    loadingMessage.textContent = 'Lỗi! Không thể tải danh sách sản phẩm.';
                    loadingMessage.classList.add('text-red-500');
                }
            }

            // Gọi hàm để bắt đầu
            fetchAndDisplayProducts();
        });
    </script>

</body>
</html>
